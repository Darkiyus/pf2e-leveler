name: PF2E Leveler Release Pipeline

env:
  project_url: 'https://github.com/${{github.repository}}'
  latest_manifest_url: 'https://github.com/${{github.repository}}/releases/latest/download/module.json'
  release_module_url: 'https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name || inputs.release_tag}}/module.zip'

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, dev]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build and update'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          NPM_CONFIG_AUDIT: false

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Module Manifest
        if: github.event_name == 'pull_request'
        run: |
          echo "Validating module.json syntax..."
          cat module.json | jq empty
          echo "Module manifest is valid JSON"

      - name: Extract Version From Tag
        id: get_version
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          version="${TAG_NAME#v}"
          if [[ -z "${version}" ]]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          echo "version-without-v=${version}" >> "${GITHUB_OUTPUT}"
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Modify Module Manifest With Release-Specific Values
        id: sub_manifest_link_version
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: cschleiden/replace-tokens@v1
        with:
          files: 'module.json'
        env:
          VERSION: ${{steps.get_version.outputs.version-without-v}}
          URL: ${{ env.project_url }}
          MANIFEST: ${{ env.latest_manifest_url }}
          DOWNLOAD: ${{ env.release_module_url }}

      - name: Set Module Manifest Version From Release Tag
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          tmp_module="$(mktemp)"
          jq --arg version "${VERSION}" '.version = $version' module.json > "${tmp_module}"
          mv "${tmp_module}" module.json
          jq empty module.json
        env:
          VERSION: ${{steps.get_version.outputs.version-without-v}}

      - name: Create Module Archive
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          zip                                    \
            --recurse-paths                      \
             ./module.zip                        \
            module.json                          \
            README.md                            \
            CHANGELOG.md                         \
            LICENSE                              \
            templates/                           \
            scripts/                             \
            styles/                              \
            lang/                                \
            assets/

      - name: Update Release With Files
        id: create_version_release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name || inputs.release_tag }}
          draft: false
          prerelease: ${{ github.event.release.prerelease || false }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: './module.json, ./module.zip'
          tag: ${{ github.event.release.tag_name || inputs.release_tag }}
          body: ${{ github.event.release.body || 'Automated PF2e Leveler release assets.' }}

  publish-to-foundry:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && !github.event.release.prerelease
    env:
      FVTT_API_TOKEN: ${{ secrets.FVTT_API_TOKEN }}

    steps:
      - name: Publish to Foundry VTT
        if: env.FVTT_API_TOKEN != ''
        uses: JamesIves/fetch-api-data-action@v2
        with:
          endpoint: https://foundryvtt.com/_api/packages/release_version/
          configuration: '{ "method": "POST", "headers": { "Content-Type": "application/json", "Authorization": "${{ env.FVTT_API_TOKEN }}" }, "body": { "id": "darkis-better-pf2e-leveler", "dry-run": false, "release": { "version": "${{github.event.release.tag_name}}", "manifest": "https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json", "notes": "https://github.com/${{github.repository}}/blob/master/README.md", "compatibility": { "minimum": "13", "verified": "14", "maximum": "" } } } }'

      - name: Skip Foundry VTT publication when no token is configured
        if: env.FVTT_API_TOKEN == ''
        run: echo "FVTT_API_TOKEN is not configured; GitHub release assets were still published."
